<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>음악 젠더 인상 설문</title>

  <!-- jsPsych core -->
  <script src="https://unpkg.com/jspsych@7.3.4/dist/index.browser.js"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" />

  <!-- plugins -->
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3/dist/index.browser.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.3/dist/index.browser.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- tracks -->
  <script src="./tracks.js?v=8"></script>

  <style>
    body {
      background: #fafafa;
    }

    .jspsych-content {
      max-width: 920px;
      text-align: left;
    }

    .survey-wrap {
      line-height: 1.8;
      font-size: 16px;
    }

    .question-block {
      margin: 24px 0;
      padding: 18px 20px;
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
    }

    .question-title {
      font-weight: 700;
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin: 8px 0;
      cursor: pointer;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      max-width: 500px;
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      margin-top: 8px;
    }

    .hidden {
      display: none;
    }

    .note {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
    }

    .warning {
      color: #c0392b;
      font-size: 14px;
      margin-top: 8px;
    }

    .slider-wrap {
      margin-top: 14px;
    }

    .likert-slider {
      width: 100%;
      margin: 10px 0 14px 0;
    }

    .slider-labels {
      display: grid;
      gap: 8px;
      font-size: 13px;
      color: #555;
    }

    .slider-labels.four {
      grid-template-columns: repeat(4, 1fr);
    }

    .slider-labels.five {
      grid-template-columns: repeat(5, 1fr);
    }

    .slider-labels div {
      text-align: center;
      line-height: 1.4;
    }

    .slider-current {
      font-size: 14px;
      color: #333;
      margin-top: 6px;
      font-weight: 600;
    }

    .audio-status {
      margin-top: 10px;
      font-size: 14px;
      color: #c0392b;
      font-weight: 600;
    }

    .audio-status.done {
      color: #1e8449;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
    }

    .left-btn {
      background: #f2f2f2;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
    }

    .validation-error {
      margin-top: 12px;
      color: #c0392b;
      font-size: 14px;
      font-weight: 600;
      white-space: pre-line;
    }

    .top-notice {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 18px 20px;
      margin: 20px 0;
      line-height: 1.8;
      font-size: 14px;
    }

    .save-box {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 24px;
      line-height: 1.8;
    }

    .save-actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .save-actions button {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #f8f8f8;
      cursor: pointer;
    }
  </style>
</head>
<body></body>

<script>
  // =========================
  // 1. 기본 확인 로그
  // =========================
  console.log("initJsPsych:", typeof initJsPsych);
  console.log("jsPsychHtmlButtonResponse:", typeof jsPsychHtmlButtonResponse);
  console.log("jsPsychSurveyHtmlForm:", typeof jsPsychSurveyHtmlForm);
  console.log("window.TRACKS exists:", !!window.TRACKS);
  console.log("window.TRACKS length:", Array.isArray(window.TRACKS) ? window.TRACKS.length : "not array");
  console.log("window.TRACKS sample:", Array.isArray(window.TRACKS) ? window.TRACKS[0] : null);

  // tracks.js 로드 실패 시 즉시 중단
  if (!Array.isArray(window.TRACKS) || window.TRACKS.length === 0) {
    console.error("tracks.js 로드 실패 또는 window.TRACKS 비어 있음");
    document.body.innerHTML = `
      <div style="max-width:800px;margin:40px auto;line-height:1.8;font-family:sans-serif;">
        <h2>트랙 데이터를 불러오지 못했습니다.</h2>
        <p>잠시 후 새로고침(Ctrl+F5)해 주세요.</p>
        <p>문제가 계속되면 <code>tracks.js</code> 파일 경로와 GitHub 업로드 상태를 확인해 주세요.</p>
      </div>
    `;
    throw new Error("window.TRACKS is missing");
  }

  // =========================
  // 2. Supabase 설정
  // =========================
  const SUPABASE_URL = "https://zididtqghlsxszjkpiuk.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppZGlkdHFnaGxzeHN6amtwaXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MTA3MjMsImV4cCI6MjA5MTA4NjcyM30.Fj0yYiHS071MCMTsdlRv7FMRiijvTyDnalgFaTaxjjw";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // =========================
  // 3. localStorage key
  // =========================
  const SAVE_KEY = "music_gender_survey_progress_v5";
  const ASSIGNMENT_KEY = "music_gender_assignment_v5";
  const PARTICIPANT_ID_KEY = "music_gender_participant_id_v5";

  // =========================
  // 4. 버전별 장르 세트
  // =========================
  const VERSION_GENRE_SETS = [
    ["blues", "jazz", "pop", "rock", "hiphop"],
    ["country", "disco", "reggae", "metal", "classical"],
    ["blues", "country", "pop", "metal", "reggae"],
    ["jazz", "disco", "rock", "classical", "hiphop"]
  ];

  // =========================
  // 5. 유틸
  // =========================
  function saveProgress(jsPsych) {
    localStorage.setItem(SAVE_KEY, JSON.stringify(jsPsych.data.get().values()));
  }

  function clearSurveyState() {
    localStorage.removeItem(SAVE_KEY);
    localStorage.removeItem(ASSIGNMENT_KEY);
    localStorage.removeItem(PARTICIPANT_ID_KEY);
  }

  function getCheckedValue(name) {
    const el = document.querySelector(`input[name="${name}"]:checked`);
    return el ? el.value : "";
  }

  function getCheckedValues(name) {
    return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(el => el.value);
  }

  function shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function getTracksForGenres(allTracks, selectedGenres) {
    let selectedTracks = [];

    selectedGenres.forEach(genre => {
      const genreTracks = allTracks.filter(t => t.genre === genre);

      const feminine = genreTracks.filter(t => t.style === "feminine");
      const masculine = genreTracks.filter(t => t.style === "masculine");
      const neutral = genreTracks.filter(t => t.style === "neutral");

      if (feminine.length < 2 || masculine.length < 2 || neutral.length < 2) {
        console.error(`장르 ${genre}에서 스타일별 곡 수가 부족합니다.`);
        return;
      }

      selectedTracks.push(...shuffle(feminine).slice(0, 2));
      selectedTracks.push(...shuffle(masculine).slice(0, 2));
      selectedTracks.push(...shuffle(neutral).slice(0, 2));
    });

    return shuffle(selectedTracks);
  }

  function getOrCreateParticipantId() {
    const saved = localStorage.getItem(PARTICIPANT_ID_KEY);
    if (saved) return saved;

    const pid = "P_" + Date.now() + "_" + Math.random().toString(36).slice(2, 10);
    localStorage.setItem(PARTICIPANT_ID_KEY, pid);
    return pid;
  }

  function sliderQuestion({ title, name, labels, columns }) {
    const cls = columns === 4 ? "four" : "five";

    return `
      <div class="question-block">
        <div class="question-title">${title}</div>

        <input type="hidden" name="${name}" value="">

        <div class="slider-wrap">
          <input
            type="range"
            min="1"
            max="${labels.length}"
            step="1"
            value="${Math.ceil(labels.length / 2)}"
            class="likert-slider"
            data-target="${name}"
          />
          <div class="slider-labels ${cls}">
            ${labels.map(label => `<div>${label}</div>`).join("")}
          </div>
          <div class="slider-current" id="${name}_current">슬라이더를 움직여 응답해 주세요.</div>
        </div>
      </div>
    `;
  }

  function setupSliders(container) {
    const sliders = container.querySelectorAll(".likert-slider");

    sliders.forEach(slider => {
      const targetName = slider.dataset.target;
      const hidden = container.querySelector(`input[name="${targetName}"]`);
      const current = container.querySelector(`#${targetName}_current`);
      const labels = Array.from(
        slider.parentElement.querySelectorAll(".slider-labels div")
      ).map(el => el.textContent.trim());

      function update() {
        hidden.value = slider.value;
        current.textContent = `선택됨: ${labels[Number(slider.value) - 1]}`;
      }

      slider.addEventListener("input", update);
      slider.addEventListener("change", update);
    });
  }

  function setupConditionalQuestions(container) {
    const q1Slider = container.querySelector(`.likert-slider[data-target="q1"]`);
    const q1Hidden = container.querySelector(`input[name="q1"]`);
    const q11 = container.querySelector("#q1_1_block");
    const q12 = container.querySelector("#q1_2_block");

    function updateConditional() {
      const q1 = q1Hidden.value;
      q11.classList.add("hidden");
      q12.classList.add("hidden");

      if (q1 === "3" || q1 === "4") {
        q11.classList.remove("hidden");
      } else if (q1 === "1" || q1 === "2") {
        q12.classList.remove("hidden");
      }
    }

    if (q1Slider) {
      q1Slider.addEventListener("input", updateConditional);
      q1Slider.addEventListener("change", updateConditional);
    }
  }

  function validateMusicForm(container, hasListened) {
    const errors = [];

    const q1 = container.querySelector(`input[name="q1"]`)?.value || "";
    const q11 = container.querySelector(`input[name="q1_1"]`)?.value || "";
    const q12 = container.querySelector(`input[name="q1_2"]`)?.value || "";
    const q2 = container.querySelector(`input[name="q2"]`)?.value || "";
    const q5 = container.querySelector(`input[name="q5"]`)?.value || "";

    const q3Checked = container.querySelectorAll(`input[name="q3"]:checked`).length;
    const q4Checked = container.querySelectorAll(`input[name="q4"]:checked`).length;

    if (!hasListened.value) {
      errors.push("음악을 끝까지 한 번 들어야 다음으로 넘어갈 수 있습니다.");
    }

    if (!q1) errors.push("Q1에 응답해 주세요.");

    if ((q1 === "3" || q1 === "4") && !q11) {
      errors.push("Q1-1에 응답해 주세요.");
    }

    if ((q1 === "1" || q1 === "2") && !q12) {
      errors.push("Q1-2에 응답해 주세요.");
    }

    if (!q2) errors.push("Q2에 응답해 주세요.");
    if (q3Checked === 0) errors.push("Q3에서 최소 1개를 선택해 주세요.");
    if (q4Checked === 0) errors.push("Q4에서 최소 1개를 선택해 주세요.");
    if (!q5) errors.push("Q5에 응답해 주세요.");

    return errors;
  }

  function getSavedProgress() {
    const saved = localStorage.getItem(SAVE_KEY);
    if (!saved) return [];

    try {
      const parsed = JSON.parse(saved);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      console.warn("저장된 progress 파싱 실패");
      return [];
    }
  }

  function removeLastCompletedMusicTrialFromProgress() {
    const saved = getSavedProgress();
    for (let i = saved.length - 1; i >= 0; i--) {
      if (saved[i].page_type === "music_trial") {
        saved.splice(i, 1);
        localStorage.setItem(SAVE_KEY, JSON.stringify(saved));
        return true;
      }
    }
    return false;
  }

  // =========================
  // 6. Supabase에서 전역 버전 가져오기
  // =========================
  async function getGlobalVersionIndex() {
    const { data, error } = await supabaseClient.rpc("get_and_increment_assignment_counter");

    if (error) {
      console.error("버전 카운터 함수 호출 실패:", error);
      throw error;
    }

    return data % VERSION_GENRE_SETS.length;
  }

  // =========================
  // 7. 같은 참가자는 새로고침해도 같은 배정 유지
  // =========================
  async function getOrCreateAssignment() {
    const saved = localStorage.getItem(ASSIGNMENT_KEY);

    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed && parsed.versionIndex !== undefined && Array.isArray(parsed.tracks)) {
          console.log("기존 배정 사용:", parsed.versionIndex, parsed.selectedGenres);
          return parsed;
        }
      } catch (e) {
        console.warn("저장된 배정 정보 파싱 실패. 새로 배정합니다.");
      }
    }

    const versionIndex = await getGlobalVersionIndex();
    const selectedGenres = VERSION_GENRE_SETS[versionIndex];
    const tracks = getTracksForGenres(window.TRACKS, selectedGenres);

    const assignment = {
      versionIndex,
      selectedGenres,
      tracks
    };

    localStorage.setItem(ASSIGNMENT_KEY, JSON.stringify(assignment));
    console.log("새 배정 생성:", versionIndex, selectedGenres);
    console.log("새 배정 트랙 수:", tracks.length);

    return assignment;
  }

  // =========================
  // 8. 응답 저장 함수
  // =========================
  function extractStructuredData(allData, participantId, assignment) {
    let background = null;
    let freeResponse = null;

    const trialData = allData.filter(row => row.trial_type === "survey-html-form");

    for (const row of allData) {
      if (row.trial_type === "survey-html-form" && row.response) {
        if (
          row.response.name !== undefined ||
          row.response.age !== undefined ||
          row.response.gender !== undefined ||
          row.response.nationality !== undefined
        ) {
          background = row.response;
        }

        if (
          row.response.free_masculine !== undefined ||
          row.response.free_feminine !== undefined ||
          row.response.free_criteria !== undefined
        ) {
          freeResponse = row.response;
        }
      }
    }

    return {
      participant_id: participantId,
      assigned_version: assignment.versionIndex,
      selected_genres: assignment.selectedGenres,
      background: background,
      free_response: freeResponse,
      trial_data: trialData
    };
  }

  async function saveResultsToSupabase(jsPsych, participantId, assignment) {
    const previousData = getSavedProgress();
    const currentData = jsPsych.data.get().values();

    const allData = previousData.length > 0 ? previousData : currentData;
    const payload = extractStructuredData(allData, participantId, assignment);

    const { error } = await supabaseClient
      .from("survey_results")
      .insert([payload]);

    if (error) {
      console.error("응답 저장 실패:", error);
      throw error;
    }

    console.log("응답 저장 성공");
  }

  // =========================
  // 9. 메인 실행
  // =========================
  (async () => {
    try {
      const participantId = getOrCreateParticipantId();
      const assignment = await getOrCreateAssignment();
      const PARTICIPANT_TRACKS = assignment.tracks;

      if (!Array.isArray(PARTICIPANT_TRACKS) || PARTICIPANT_TRACKS.length !== 30) {
        alert("배정된 트랙 수가 올바르지 않습니다. tracks.js와 장르 구성을 확인해주세요.");
        console.error("배정 오류:", PARTICIPANT_TRACKS);
        return;
      }

      console.log("participantId:", participantId);
      console.log("버전:", assignment.versionIndex);
      console.log("장르:", assignment.selectedGenres);
      console.log("트랙 수:", PARTICIPANT_TRACKS.length);
      console.log("첫 번째 트랙 URL:", PARTICIPANT_TRACKS[0]?.file);

      const savedProgress = getSavedProgress();

      const introDone = savedProgress.some(row => row.trial_type === "html-button-response" && row.page_type === "intro");
      const backgroundDone = savedProgress.some(row => row.page_type === "background");
      const completedMusicTrials = savedProgress.filter(row => row.page_type === "music_trial").length;
      const freeResponseDone = savedProgress.some(row => row.page_type === "free_response");
      const submitConfirmDone = savedProgress.some(row => row.trial_type === "html-button-response" && row.page_type === "submit_confirm");

      const jsPsych = initJsPsych({
        show_progress_bar: true,
        auto_update_progress_bar: true,
        on_trial_finish: function() {
          saveProgress(jsPsych);
        }
      });

      let timeline = [];

      // 시작 화면
      if (!introDone) {
        timeline.push({
          type: jsPsychHtmlButtonResponse,
          data: { page_type: "intro", participant_id: participantId },
          stimulus: `
            <div class="survey-wrap">
              <h2>음악 인상 설문</h2>

              <div class="top-notice">
                - <strong>모바일 참여 가능</strong><br>
                - 가능하면 <strong>이어폰/헤드폰 착용</strong>을 권장합니다.<br>
                - 네트워크 상황에 따라 곡 로딩에 잠깐의 시간이 소요될 수 있습니다.<br>
                - 각 음악은 한 번 끝까지 들어야 다음으로 넘어갈 수 있습니다.
              </div>

              <p>
                본 설문은 음악의 <strong>도입부 10초</strong>를 들었을 때 사람들이 어떤 인상을 받는지 알아보기 위한
                연구의 일환으로 진행됩니다. 각 문항에는 정답이 없으므로, 느끼신 그대로 편하게 응답해 주시면 됩니다.
              </p>
              <p>
                설문 종료 후 연락 가능한 <strong>전화번호를 남겨주신 분들에 한해</strong>, 추첨을 통해
                <strong>세 분께 스타벅스 10,000원 상당의 기프티콘</strong>을 드릴 예정입니다.
                많은 관심과 참여 부탁드립니다.
              </p>
              <p class="note">
                수집된 개인정보는 연구 및 기프티콘 지급 목적 외에는 사용되지 않으며,
                연구 종료 후 안전하게 폐기될 예정입니다.
              </p>
            </div>
          `,
          choices: ["시작하기"]
        });
      }

      // 배경 문항
      if (!backgroundDone) {
        timeline.push({
          type: jsPsychSurveyHtmlForm,
          data: {
            page_type: "background",
            participant_id: participantId
          },
          preamble: `
            <div class="survey-wrap">
              <h2>배경 문항</h2>
            </div>
          `,
          html: `
            <div class="question-block">
              <div class="question-title">이름</div>
              <input name="name" type="text" />
            </div>

            <div class="question-block">
              <div class="question-title">나이</div>
              <input name="age" type="number" min="1" />
            </div>

            <div class="question-block">
              <div class="question-title">젠더</div>
              <label><input type="radio" name="gender" value="female"> 여성</label>
              <label><input type="radio" name="gender" value="male"> 남성</label>
              <label><input type="radio" name="gender" value="nonbinary"> 논바이너리/기타</label>
              <label><input type="radio" name="gender" value="prefer_not_to_say"> 응답하고 싶지 않음</label>
            </div>

            <div class="question-block">
              <div class="question-title">국적</div>
              <input name="nationality" type="text" />
            </div>

            <div class="question-block">
              <div class="question-title">음악 청취 빈도</div>
              <label><input type="radio" name="listening_freq" value="rarely"> 거의 듣지 않음</label>
              <label><input type="radio" name="listening_freq" value="sometimes"> 가끔 듣는 편</label>
              <label><input type="radio" name="listening_freq" value="often"> 자주 듣는 편</label>
              <label><input type="radio" name="listening_freq" value="very_often"> 매우 자주 듣는 편</label>
            </div>

            <div class="question-block">
              <div class="question-title">음악 교육 경험</div>
              <label><input type="radio" name="music_education" value="none"> 없음</label>
              <label><input type="radio" name="music_education" value="less_than_1_year"> 1년 미만</label>
              <label><input type="radio" name="music_education" value="1_to_3_years"> 1~3년</label>
              <label><input type="radio" name="music_education" value="more_than_3_years"> 3년 이상</label>
              <input name="music_education_detail" type="text" placeholder="예: 피아노 5년, 합창단 활동, 독학으로 작곡 공부 등 (선택)" />
            </div>

            <div class="question-block">
              <div class="question-title">전화번호 (선택)</div>
              <input name="phone_number" type="text" placeholder="예: 010-1234-5678" />
              <p class="note">기프티콘 추첨 및 지급을 위한 연락처입니다. 연구 종료 후 폐기됩니다.</p>
            </div>
          `,
          button_label: "다음"
        });
      }

      // 자극별 문항
      for (let idx = completedMusicTrials; idx < PARTICIPANT_TRACKS.length; idx++) {
        const track = PARTICIPANT_TRACKS[idx];

        timeline.push({
          type: jsPsychSurveyHtmlForm,
          data: {
            page_type: "music_trial",
            participant_id: participantId,
            track_id: track.id,
            original_name: track.original_name || "",
            track_file: track.file,
            genre: track.genre || "",
            style: track.style || "",
            assigned_version: assignment.versionIndex
          },
          preamble: `
            <div class="survey-wrap">
              <h2>음악 듣기</h2>
              <p><strong>${idx + 1} / ${PARTICIPANT_TRACKS.length}</strong></p>

              <div class="question-block">
                <div class="question-title">음악 재생</div>
                <p class="note">
                  아래 음악을 끝까지 한 번 들은 뒤 응답해 주세요. 다시 듣기 가능합니다.<br>
                  네트워크 상황에 따라 로딩에 잠깐 시간이 걸릴 수 있습니다.
                </p>
                <audio controls preload="auto" id="trial-audio" src="${track.file}"></audio>
                <div class="audio-status" id="audio-status">음악을 끝까지 들으면 다음 버튼이 활성화됩니다.</div>
              </div>
            </div>
          `,
          html: `
            ${sliderQuestion({
              title: "Q1. 이 음악은 젠더화된 이미지를 떠올리게 했나요?",
              name: "q1",
              columns: 4,
              labels: [
                "1. 전혀 떠오르지 않았다",
                "2. 거의 떠오르지 않음",
                "3. 다소 떠오름",
                "4. 매우 강하게 떠오름"
              ]
            })}

            <div id="q1_1_block" class="hidden">
              ${sliderQuestion({
                title: "Q1-1. 가장 먼저 떠오른 젠더 이미지는 어느 쪽인가요?",
                name: "q1_1",
                columns: 5,
                labels: [
                  "1. 매우 여성적",
                  "2. 다소 여성적",
                  "3. 중성적 (여성, 남성 둘 다 잘 어울림)",
                  "4. 다소 남성적",
                  "5. 매우 남성적"
                ]
              })}
            </div>

            <div id="q1_2_block" class="hidden">
              ${sliderQuestion({
                title: "Q1-2. 이 곡에 어울리는 젠더 이미지를 떠올려본다면 어느 쪽인가요?",
                name: "q1_2",
                columns: 5,
                labels: [
                  "1. 매우 여성적",
                  "2. 다소 여성적",
                  "3. 중성적 (여성, 남성 둘 다 잘 어울림)",
                  "4. 다소 남성적",
                  "5. 매우 남성적"
                ]
              })}
            </div>

            ${sliderQuestion({
              title: "Q2. 위 판단에 대한 확신은 어느 정도인가요?",
              name: "q2",
              columns: 5,
              labels: [
                "1. 전혀 확신이 없음",
                "2. 다소 확신이 없음",
                "3. 보통",
                "4. 다소 확신이 있음",
                "5. 매우 확신함"
              ]
            })}

            <div class="question-block">
              <div class="question-title">Q3. 위의 젠더 이미지 판단에 가장 큰 영향을 준 요소는 무엇인가요? (복수응답 가능)</div>
              <label><input type="checkbox" name="q3" value="instrument"> 악기 구성</label>
              <label><input type="checkbox" name="q3" value="rhythm"> 리듬/비트</label>
              <label><input type="checkbox" name="q3" value="tempo"> 빠르기 (tempo)</label>
              <label><input type="checkbox" name="q3" value="genre_feel"> 장르적 느낌</label>
              <label><input type="checkbox" name="q3" value="mood"> 곡의 분위기</label>
              <label><input type="checkbox" name="q3" value="other"> 기타</label>
              <input type="text" name="q3_other_text" placeholder="기타 내용을 적어주세요 (선택)" />
            </div>

            <div class="question-block">
              <div class="question-title">Q4. 이 음악은 다음 중 어떤 장르적 인상에 가장 가까웠나요? (복수응답 가능)</div>
              <label><input type="checkbox" name="q4" value="rock"> 락 계열</label>
              <label><input type="checkbox" name="q4" value="metal"> 메탈 계열</label>
              <label><input type="checkbox" name="q4" value="pop"> 팝 계열</label>
              <label><input type="checkbox" name="q4" value="hiphop"> 힙합 계열</label>
              <label><input type="checkbox" name="q4" value="classical"> 클래식 계열</label>
              <label><input type="checkbox" name="q4" value="disco"> 디스코 계열</label>
              <label><input type="checkbox" name="q4" value="reggae"> 레게 계열</label>
              <label><input type="checkbox" name="q4" value="country"> 컨츄리 음악 계열</label>
              <label><input type="checkbox" name="q4" value="blues"> 블루스 계열</label>
              <label><input type="checkbox" name="q4" value="jazz"> 재즈 계열</label>
              <label><input type="checkbox" name="q4" value="other"> 기타</label>
              <label><input type="checkbox" name="q4" value="unknown"> 잘 모르겠음</label>
              <input type="text" name="q4_other_text" placeholder="기타 내용을 적어주세요 (선택)" />
            </div>

            ${sliderQuestion({
              title: "Q5. 이 음악의 장르적 인상이 젠더 이미지를 떠올리는 데 얼마나 영향을 주었다고 생각하나요?",
              name: "q5",
              columns: 5,
              labels: [
                "1. 전혀 영향이 없었다",
                "2. 거의 영향이 없었다",
                "3. 보통이다",
                "4. 다소 영향이 있었다",
                "5. 매우 영향이 있었다"
              ]
            })}

            <div class="validation-error" id="validation-error"></div>

            <div class="nav-row">
              <button type="button" class="left-btn" id="back-btn">이전 곡</button>
            </div>
          `,
          button_label: "다음 곡으로",
          on_load: function() {
            const container = document;
            const form = container.querySelector("#jspsych-survey-html-form");
            const nextBtn = container.querySelector("#jspsych-survey-html-form-next");
            const audio = container.querySelector("#trial-audio");
            const audioStatus = container.querySelector("#audio-status");
            const errorBox = container.querySelector("#validation-error");
            const backBtn = container.querySelector("#back-btn");
            const hasListened = { value: false };

            setupSliders(container);
            setupConditionalQuestions(container);

            if (nextBtn) nextBtn.disabled = true;

            if (audio) {
              audio.addEventListener("ended", function() {
                hasListened.value = true;
                if (nextBtn) nextBtn.disabled = false;
                audioStatus.textContent = "청취 완료. 이제 제출할 수 있습니다.";
                audioStatus.classList.add("done");
              });
            }

            if (backBtn) {
              if (idx === 0) {
                backBtn.style.visibility = "hidden";
              } else {
                backBtn.addEventListener("click", function() {
                  removeLastCompletedMusicTrialFromProgress();
                  window.location.reload();
                });
              }
            }

            form.addEventListener("submit", function(e) {
              const q1 = document.querySelector('input[name="q1"]')?.value || "";
              const q2 = document.querySelector('input[name="q2"]')?.value || "";
              const q5 = document.querySelector('input[name="q5"]')?.value || "";
              const q1_1 = document.querySelector('input[name="q1_1"]')?.value || "";
              const q1_2 = document.querySelector('input[name="q1_2"]')?.value || "";
              const q3 = getCheckedValues("q3");
              const q4 = getCheckedValues("q4");

              const errors = [];

              if (!hasListened.value) {
                errors.push("음악을 끝까지 한 번 들어야 다음으로 넘어갈 수 있습니다.");
              }

              if (!q1) errors.push("Q1에 응답해 주세요.");
              if (!q2) errors.push("Q2에 응답해 주세요.");
              if (!q5) errors.push("Q5에 응답해 주세요.");
              if (q3.length === 0) errors.push("Q3에서 최소 1개를 선택해 주세요.");
              if (q4.length === 0) errors.push("Q4에서 최소 1개를 선택해 주세요.");

              if ((q1 === "3" || q1 === "4") && !q1_1) {
                errors.push("Q1-1에 응답해 주세요.");
              }

              if ((q1 === "1" || q1 === "2") && !q1_2) {
                errors.push("Q1-2에 응답해 주세요.");
              }

              if (errors.length > 0) {
                e.preventDefault();
                errorBox.textContent = errors.join("\n");
                window.scrollTo({ top: 0, behavior: "smooth" });
                return false;
              } else {
                errorBox.textContent = "";
              }
            });
          },
          on_finish: function(data) {
            const response = data.response || {};

            response.q1 = document.querySelector('input[name="q1"]')?.value || "";
            response.q1_1 = document.querySelector('input[name="q1_1"]')?.value || "";
            response.q1_2 = document.querySelector('input[name="q1_2"]')?.value || "";
            response.q2 = document.querySelector('input[name="q2"]')?.value || "";
            response.q3 = getCheckedValues("q3");
            response.q4 = getCheckedValues("q4");
            response.q5 = document.querySelector('input[name="q5"]')?.value || "";

            data.response = response;
          }
        });
      }

      // 자유 서술
      if (!freeResponseDone) {
        timeline.push({
          type: jsPsychSurveyHtmlForm,
          data: {
            page_type: "free_response",
            participant_id: participantId
          },
          preamble: `
            <div class="survey-wrap">
              <h2>마지막 자유 서술 문항</h2>
              <p>모든 음악을 들은 뒤의 전체적인 인상을 적어주세요.</p>
            </div>
          `,
          html: `
            <div class="question-block">
              <div class="question-title">1. 설문에서 젠더 이미지를 판단할 때 본인이 주로 어떤 기준을 사용했다고 생각하시나요?</div>
              <p class="note">예: 음악학적 지식, 자신의 교육 경험, 문화적 편견, 잘 모르겠다 등</p>
              <textarea name="free_criteria"></textarea>
            </div>

            <div class="question-block">
              <div class="question-title">2. 전체적으로 어떤 특징의 음악이 ‘남성적’이라고 느껴졌나요?</div>
              <textarea name="free_masculine"></textarea>
            </div>

            <div class="question-block">
              <div class="question-title">3. 전체적으로 어떤 특징의 음악이 ‘여성적’이라고 느껴졌나요?</div>
              <textarea name="free_feminine"></textarea>
            </div>

            <div class="question-block">
              <div class="question-title">4. 판단하기 어려운 경우(잘 모르겠거나, 중성적임)가 있었다면 왜 어려웠던 것 같으신가요?</div>
              <textarea name="free_difficulty"></textarea>
            </div>

            <div class="question-block">
              <div class="question-title">5. 음악의 ‘젠더성’(여성적인 음악, 남성적인 음악)이라는 것이 있다고 생각하시나요? 있다면 어떤 음악일까요?</div>
              <textarea name="free_gendered_music"></textarea>
            </div>
          `,
          button_label: "제출하기"
        });
      }

      // 제출 화면
      if (!submitConfirmDone) {
        timeline.push({
          type: jsPsychHtmlButtonResponse,
          data: { page_type: "submit_confirm", participant_id: participantId },
          stimulus: `
            <div class="survey-wrap">
              <h2>마지막 단계입니다</h2>
              <p>응답을 저장하시려면 아래 버튼을 눌러주세요.</p>
            </div>
          `,
          choices: ["응답 제출하기"]
        });
      }

      // 실제 저장
      timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `
          <div class="save-box" id="save-box">
            <h2>응답 저장 중입니다...</h2>
            <p>잠시만 기다려주세요.</p>
          </div>
        `,
        choices: [],
        on_load: function() {
          const box = document.getElementById("save-box");

          const trySave = async () => {
            box.innerHTML = `
              <h2>응답 저장 중입니다...</h2>
              <p>잠시만 기다려주세요.</p>
            `;

            try {
              await saveResultsToSupabase(jsPsych, participantId, assignment);
              clearSurveyState();

              box.innerHTML = `
                <h2>설문이 완료되었습니다.</h2>
                <p>참여해주셔서 감사합니다.</p>
                <p class="note">연구자 측 DB에 응답이 저장되었습니다.</p>
                <div class="save-actions">
                  <button id="finish-close">종료</button>
                </div>
              `;

              document.getElementById("finish-close").addEventListener("click", function() {
                window.location.reload();
              });
            } catch (e) {
              console.error("응답 저장 실패:", e);

              box.innerHTML = `
                <h2>응답 저장에 실패했습니다.</h2>
                <p>
                  네트워크 문제 또는 저장 설정 문제일 수 있습니다.<br>
                  아래 버튼으로 다시 저장을 시도해 주세요.
                </p>
                <div class="save-actions">
                  <button id="retry-save">다시 저장하기</button>
                </div>
              `;

              document.getElementById("retry-save").addEventListener("click", trySave);
            }
          };

          trySave();
        }
      });

      jsPsych.run(timeline);

    } catch (err) {
      console.error("설문 초기화 실패:", err);
      document.body.innerHTML = `
        <div style="max-width:800px;margin:40px auto;line-height:1.8;font-family:sans-serif;">
          <h2>설문을 불러오는 중 오류가 발생했습니다.</h2>
          <p>잠시 후 다시 시도해 주세요.</p>
          <p>문제가 반복되면 연구자에게 알려주세요.</p>
        </div>
      `;
    }
  })();
</script>
</html>
